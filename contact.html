<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeremy Zelken</title>
    <link rel="icon" href="favicon.svg">
    <meta
      name="description"
      content="Writer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
      /* ─── RESET ───────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }

      /* ─── VARIABLES ───────────────────────────────────────── */
      :root {
        --bg: #f8f7f3;
        --surface: #ffffff;
        --surface2: #f2f0eb;
        --border: rgba(0,0,0,0.1);
        --border-h: rgba(255, 255, 255, 0.14);
        --text: #111111;
        --text-muted: #777777;
        --text-dim: #aaaaaa;
      }

      /* ─── BASE ────────────────────────────────────────────── */
      body {
        font-family: var(--serif);
        background: var(--bg);
        color: var(--text);
        font-size: 14px;
        line-height: 1.65;
        overflow-x: hidden;
        /* cursor: none; */
      }

      /* ─── CUSTOM CURSOR ───────────────────────────────────── */
      /* .cursor {
        position: fixed;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        pointer-events: none;
        z-index: 9999;
        transition:
          transform 0.1s,
          opacity 0.2s;
        mix-blend-mode: difference;
      }
      .cursor-ring {
        position: fixed;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 1px solid rgba(74, 222, 128, 0.35);
        pointer-events: none;
        z-index: 9998;
        transition:
          transform 0.18s var(--ease),
          width 0.2s,
          height 0.2s,
          opacity 0.2s;
      }
      body:has(a:hover) .cursor-ring,
      body:has(button:hover) .cursor-ring {
        width: 48px;
        height: 48px;
        border-color: rgba(74, 222, 128, 0.5);
      } */

      /* ─── GRAIN OVERLAY ───────────────────────────────────── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        background-size: 256px;
        pointer-events: none;
        z-index: 1;
        opacity: 0.6;
      }

      /* ─── NAV ─────────────────────────────────────────────── */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        height: 52px;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
        display: flex;
        align-items: center;
        padding: 0 2.5rem;
      }
      .nav-inner {
        max-width: 1000px;
        margin: 0 auto;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .nav-logo {
        font-family: var(--serif);
        font-size: 18px;
        font-weight: 300;
        color: var(--text);
        text-decoration: none;
        letter-spacing: -0.02em;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .nav-links {
        display: flex;
        gap: 0;
        list-style: none;
      }
      .nav-links a {
        font-size: 12px;
        color: var(--text-muted);
        text-decoration: none;
        padding: 6px 14px;
        letter-spacing: 0.05em;
        transition: color 0.2s;
        border-radius: 4px;
      }
      .nav-links a:hover {
        color: var(--text);
      }

      /* ─── SECTIONS BASE ───────────────────────────────────── */
      .section {
        padding: 7rem 2.5rem;
        position: relative;
        z-index: 2;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
      }

      .section-label {
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .section-label::before {
        content: "";
        width: 24px;
        height: 1px;
        background: var(--text-muted);
      }


      /* ─── CONTACT ─────────────────────────────────────────── */
      #contact {
        border-top: 1px solid var(--border);
      }

      .contact-inner {
        margin-top: 2rem;
        opacity: 0;
        transform: translateY(20px);
      }
      .contact-headline {
        font-family: var(--serif);
        font-size: clamp(2rem, 5vw, 4rem);
        font-weight: 400;
        line-height: 1.15;
        color: var(--accent);
        margin-bottom: 1rem;
        max-width: 640px;
      }
      .contact-headline em {
        font-style: italic;
        color: var(--text-muted);
      }
      .contact-sub {
        font-size: 13px;
        color: var(--text-muted);
        max-width: 400px;
        line-height: 1.8;
        margin-bottom: 2.5rem;
      }
      .contact-email {
        font-family: var(--serif);
        font-size: clamp(1.2rem, 2.5vw, 1.8rem);
        font-style: italic;
        color: var(--text);
        text-decoration: none;
        display: inline-block;
        border-bottom: 1px solid var(--border);
        padding-bottom: 4px;
        margin-bottom: 2.5rem;
        transition:
          color 0.2s,
          border-color 0.2s;
      }
      .contact-email:hover {
        color: var(--green);
        border-color: rgba(74, 222, 128, 0.4);
      }

      .social-row {
        display: flex;
        gap: 2rem;
        flex-wrap: wrap;
      }
      .social-link {
        font-size: 12px;
        color: var(--text-muted);
        text-decoration: none;
        letter-spacing: 0.06em;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: color 0.15s;
      }
      .social-link::after {
        content: "↗";
        font-size: 10px;
        opacity: 0;
        transform: translateY(2px);
        transition:
          opacity 0.15s,
          transform 0.15s;
      }
      .social-link:hover {
        color: var(--text);
      }
      .social-link:hover::after {
        opacity: 1;
        transform: translateY(0);
      }

      /* ─── FOOTER ──────────────────────────────────────────── */
      .footer {
        border-top: 1px solid var(--border);
        padding: 1.5rem 2.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: relative;
        z-index: 2;
        color: var(--text);
      }
      .footer-inner {
        max-width: 1000px;
        margin: 0 auto;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .footer-left {
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 0.04em;
      }
      .footer-left a {
        color: var(--text);
        text-decoration: underline;
        transition: color 0.15s;
      }
      .footer-left a:hover {
        color: var(--text-muted);
      }
      .footer-right {
        font-size: 11px;
        color: var(--text);
      }

      /* ─── RESPONSIVE ──────────────────────────────────────── */
      @media (max-width: 700px) {
        .nav {
          padding: 0 1.25rem;
        }
        .section {
          padding: 5rem 1.25rem;
        }
        .skills-grid {
          grid-template-columns: 1fr;
        }
        .about-grid {
          grid-template-columns: 1fr;
          gap: 2.5rem;
        }
        .writing-right {
          display: none;
        }
       .nav-links {
          display: flex;
          gap: 0.75rem;
        }

      .nav-links a {
        font-size: 11px;
      }
        .hero-title {
          font-size: 2.6rem;
        }
        .footer {
          padding: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- cursors -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursor-ring"></div>

    <!-- ─── NAV ────────────────────────────────────────────── -->
<nav class="nav">
  <div class="nav-inner">

    <a href="index.html" class="nav-logo">
      Jeremy Zelken
    </a>

    <ul class="nav-links">
      <li><a href="writing.html">Writing</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

  </div>
</nav>

    <!-- ─── CONTACT ────────────────────────────────────────── -->
    <section id="contact me" class="section">
      <div class="container">
        <div class="section-label">contact</div>
        <div class="contact-inner">

          <a href="mailto:jeremyzelken@gmail.com" class="contact-email">
            jeremyzelken@gmail.com
          </a>
          <div class="social-row">
            <a href="https://www.linkedin.com/in/jeremyzelken" class="social-link">linkedin</a>
            <a href="https://www.instagram.com/jeremyzelken/" class="social-link">instagram</a>
          </div>
        </div>
      </div>
    </section>

    <!-- ─── JS ─────────────────────────────────────────────── -->
    <script>
      /* cursor */
      const cursor = document.getElementById("cursor");
      const ring = document.getElementById("cursor-ring");
      let mx = 0,
        my = 0,
        rx = 0,
        ry = 0;
      document.addEventListener("mousemove", (e) => {
        mx = e.clientX;
        my = e.clientY;
      });
      (function loop() {
        rx += (mx - rx) * 0.12;
        ry += (my - ry) * 0.12;
        cursor.style.transform = `translate(${mx - 4}px, ${my - 4}px)`;
        ring.style.transform = `translate(${rx - 16}px, ${ry - 16}px)`;
        requestAnimationFrame(loop);
      })();
      document.addEventListener("mouseleave", () => {
        cursor.style.opacity = 0;
        ring.style.opacity = 0;
      });
      document.addEventListener("mouseenter", () => {
        cursor.style.opacity = 1;
        ring.style.opacity = 1;
      });

      /* GSAP */
      gsap.registerPlugin(ScrollTrigger);

      /* skills + about + contact */
      [".skills-grid", ".about-grid", ".contact-inner"].forEach((sel) => {
        const el = document.querySelector(sel);
        if (!el) return;
        gsap.to(el, {
          opacity: 1,
          y: 0,
          duration: 0.7,
          ease: "power2.out",
          scrollTrigger: { trigger: el, start: "top 85%" },
        });
      });

      /* active nav link highlight */
      const sections = document.querySelectorAll("section[id]");
      const navLinks = document.querySelectorAll(".nav-links a");
      const io = new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              navLinks.forEach((a) => {
                a.style.color =
                  a.getAttribute("href") === "#" + e.target.id
                    ? "var(--text)"
                    : "";
              });
            }
          });
        },
        { threshold: 0.4 },
      );
      sections.forEach((s) => io.observe(s));
    </script>
  </body>
</html>
