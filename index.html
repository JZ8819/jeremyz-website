<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeremy Zelken</title>
    <meta
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
      /* ─── RESET ───────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }

      /* ─── VARIABLES ───────────────────────────────────────── */
      :root {
        --bg: #f8f7f3;
        --surface: #ffffff;
        --surface2: #f2f0eb;
        --border: rgba(0,0,0,0.1);
        --border-h: rgba(255, 255, 255, 0.14);
        --text: #111111;
        --text-muted: #777777;
        --text-dim: #aaaaaa;
      }

      /* ─── BASE ────────────────────────────────────────────── */
      body {
        font-family: var(--serif);
        background: var(--bg);
        color: var(--text);
        font-size: 14px;
        line-height: 1.65;
        overflow-x: hidden;
        /* cursor: none; */
      }

      /* ─── CUSTOM CURSOR ───────────────────────────────────── */
      /* .cursor {
        position: fixed;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        pointer-events: none;
        z-index: 9999;
        transition:
          transform 0.1s,
          opacity 0.2s;
        mix-blend-mode: difference;
      }
      .cursor-ring {
        position: fixed;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 1px solid rgba(74, 222, 128, 0.35);
        pointer-events: none;
        z-index: 9998;
        transition:
          transform 0.18s var(--ease),
          width 0.2s,
          height 0.2s,
          opacity 0.2s;
      }
      body:has(a:hover) .cursor-ring,
      body:has(button:hover) .cursor-ring {
        width: 48px;
        height: 48px;
        border-color: rgba(74, 222, 128, 0.5);
      } */

      /* ─── GRAIN OVERLAY ───────────────────────────────────── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        background-size: 256px;
        pointer-events: none;
        z-index: 1;
        opacity: 0.6;
      }

      /* ─── NAV ─────────────────────────────────────────────── */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        height: 52px;
        border-bottom: 1px solid var(--border);
        background: rgba(14, 14, 14, 0.88);
        backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        padding: 0 2.5rem;
      }
      .nav-inner {
        max-width: 1000px;
        margin: 0 auto;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .nav-logo {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        text-decoration: none;
        letter-spacing: 0.04em;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .nav-links {
        display: flex;
        gap: 0;
        list-style: none;
      }
      .nav-links a {
        font-size: 12px;
        color: var(--text-muted);
        text-decoration: none;
        padding: 6px 14px;
        letter-spacing: 0.05em;
        transition: color 0.2s;
        border-radius: 4px;
      }
      .nav-links a:hover {
        color: var(--text);
      }

      /* ─── SECTIONS BASE ───────────────────────────────────── */
      .section {
        padding: 7rem 2.5rem;
        position: relative;
        z-index: 2;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
      }

      .section-label {
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .section-label::before {
        content: "";
        width: 24px;
        height: 1px;
        background: var(--text-muted);
      }

      /* ─── HOME ────────────────────────────────────────────── */
      #home {
        min-height: 100vh;
        display: flex;
        align-items: center;
        padding-top: 52px;
      }
      .home-inner {
        padding: 4rem 0 2rem;
      }

      .greeting {
        font-size: 12px;
        letter-spacing: 0.1em;
        color: var(--text-muted);
        margin-bottom: 1.5rem;
        opacity: 0;
      }
      .hero-title {
        font-family: var(--serif);
        font-size: clamp(3rem, 7vw, 5.5rem);
        font-weight: 400;
        line-height: 1.1;
        color: var(--accent);
        margin-bottom: 1rem;
        opacity: 0;
      }
      .hero-title em {
        font-style: italic;
        color: var(--text-muted);
      }

      .hero-role {
        font-size: 13px;
        color: var(--text-muted);
        letter-spacing: 0.06em;
        margin-bottom: 2rem;
        opacity: 0;
      }

      .hero-desc {
        font-size: 13px;
        color: var(--text-muted);
        max-width: 480px;
        line-height: 1.8;
        margin-bottom: 2.5rem;
        opacity: 0;
      }

      .hero-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        opacity: 0;
      }
      .btn-primary {
        background: var(--accent);
        color: #0e0e0e;
        border: none;
        border-radius: 5px;
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 600;
        padding: 9px 20px;
        cursor: pointer;
        letter-spacing: 0.04em;
        transition:
          opacity 0.15s,
          transform 0.1s;
      }
      .btn-primary:hover {
        opacity: 0.85;
      }
      .btn-primary:active {
        transform: scale(0.97);
      }
      .btn-ghost {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--border);
        border-radius: 5px;
        font-family: var(--mono);
        font-size: 12px;
        padding: 8px 18px;
        cursor: pointer;
        transition:
          border-color 0.15s,
          color 0.15s;
      }
      .btn-ghost:hover {
        border-color: var(--border-h);
        color: var(--text);
      }

      /* availability badge */
      .avail-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--green);
        background: var(--green-glow);
        border: 1px solid rgba(74, 222, 128, 0.2);
        padding: 4px 12px;
        border-radius: 100px;
        margin-bottom: 2rem;
        opacity: 0;
      }
      .avail-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--green);
      }

      /* ─── FOOTER ──────────────────────────────────────────── */
      .footer {
        border-top: 1px solid var(--border);
        padding: 1.5rem 2.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: relative;
        z-index: 2;
        color: var(--text);
      }
      .footer-inner {
        max-width: 1000px;
        margin: 0 auto;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .footer-left {
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 0.04em;
      }
      .footer-left a {
        color: var(--text);
        text-decoration: underline;
        transition: color 0.15s;
      }
      .footer-left a:hover {
        color: var(--text-muted);
      }
      .footer-right {
        font-size: 11px;
        color: var(--text);
      }

      /* ─── RESPONSIVE ──────────────────────────────────────── */
      @media (max-width: 700px) {
        .nav {
          padding: 0 1.25rem;
        }
        .section {
          padding: 5rem 1.25rem;
        }
        .skills-grid {
          grid-template-columns: 1fr;
        }
        .about-grid {
          grid-template-columns: 1fr;
          gap: 2.5rem;
        }
        .work-right {
          display: none;
        }
        .nav-links {
          display: none;
        }
        .hero-title {
          font-size: 2.6rem;
        }
        .footer {
          padding: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- cursors -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursor-ring"></div>

    <!-- ─── NAV ────────────────────────────────────────────── -->
    <nav class="nav">
      <div class="nav-inner">
        <a href="index.html" class="nav-logo"> Jeremy Z. </a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="work.html">Work</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </div>
    </nav>

    <!-- ─── HOME ───────────────────────────────────────────── -->
    <section id="home" class="section">
      <div class="container">
        <div class="home-inner">
          <div class="greeting">hi, i'm</div>
          </div>
          <h1 class="hero-title">
          Jeremy Zelken<br />
            <em>writer</em>
          </h1>
          <p class="hero-role">writer, editor, marketer.</p>
          </p>
          <div class="hero-actions">
            <button
              class="btn-primary"
              onclick="
                document
                  .getElementById('contact')
                  .scrollIntoView({ behavior: 'smooth' })
              "
            >
              get in touch
            </button>
            <button
              class="btn-ghost"
              onclick="
                document
                  .getElementById('about')
                  .scrollIntoView({ behavior: 'smooth' })
              "
            >
              know more
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- ─── FOOTER ─────────────────────────────────────────── -->
    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-left">
          © 2026 Jeremy Zelken &mdash; Portfolio
          restyled
        </div>
        <span class="footer-right"
            ><a
            class="footer-right"
              href="https://github.com/kayspace/portfolio-template/blob/master/templates/template1.html"
              target="_blank"
              >fork/source code ✪</a
            ></span>
      </div>
    </footer>

    <!-- ─── JS ─────────────────────────────────────────────── -->
    <script>
      /* cursor */
      const cursor = document.getElementById("cursor");
      const ring = document.getElementById("cursor-ring");
      let mx = 0,
        my = 0,
        rx = 0,
        ry = 0;
      document.addEventListener("mousemove", (e) => {
        mx = e.clientX;
        my = e.clientY;
      });
      (function loop() {
        rx += (mx - rx) * 0.12;
        ry += (my - ry) * 0.12;
        cursor.style.transform = `translate(${mx - 4}px, ${my - 4}px)`;
        ring.style.transform = `translate(${rx - 16}px, ${ry - 16}px)`;
        requestAnimationFrame(loop);
      })();
      document.addEventListener("mouseleave", () => {
        cursor.style.opacity = 0;
        ring.style.opacity = 0;
      });
      document.addEventListener("mouseenter", () => {
        cursor.style.opacity = 1;
        ring.style.opacity = 1;
      });

      /* GSAP */
      gsap.registerPlugin(ScrollTrigger);

      /* hero entrance — staggered */
      const heroTl = gsap.timeline({ defaults: { ease: "power3.out" } });
      heroTl
        .to(".greeting", { opacity: 1, y: 0, duration: 0.7 }, 0.2)
        .to(".avail-badge", { opacity: 1, y: 0, duration: 0.6 }, 0.35)
        .to(".hero-title", { opacity: 1, y: 0, duration: 0.9 }, 0.45)
        .to(".hero-role", { opacity: 1, y: 0, duration: 0.6 }, 0.7)
        .to(".hero-desc", { opacity: 1, y: 0, duration: 0.6 }, 0.8)
        .to(".hero-actions", { opacity: 1, y: 0, duration: 0.6 }, 0.95)
        .to(".scroll-hint", { opacity: 1, y: 0, duration: 0.5 }, 1.1);

      /* set initial states */
      gsap.set(
        [
          ".greeting",
          ".avail-badge",
          ".hero-title",
          ".hero-role",
          ".hero-desc",
          ".hero-actions",
          ".scroll-hint",
        ],
        { y: 18 },
      );

      /* active nav link highlight */
      const sections = document.querySelectorAll("section[id]");
      const navLinks = document.querySelectorAll(".nav-links a");
      const io = new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              navLinks.forEach((a) => {
                a.style.color =
                  a.getAttribute("href") === "#" + e.target.id
                    ? "var(--text)"
                    : "";
              });
            }
          });
        },
        { threshold: 0.4 },
      );
      sections.forEach((s) => io.observe(s));
    </script>
  </body>
</html>
