<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeremy Zelken</title>
    <meta
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
      /* ─── RESET ───────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }

      /* ─── VARIABLES ───────────────────────────────────────── */
      :root {
        --bg: #f8f7f3;
        --surface: #ffffff;
        --surface2: #f2f0eb;
        --border: rgba(0,0,0,0.1);
        --border-h: rgba(255, 255, 255, 0.14);
        --text: #111111;
        --text-muted: #777777;
        --text-dim: #aaaaaa;
      }

      /* ─── BASE ────────────────────────────────────────────── */
      body {
        font-family: var(--serif);
        background: var(--bg);
        color: var(--text);
        font-size: 14px;
        line-height: 1.65;
        overflow-x: hidden;
        /* cursor: none; */
      }

      /* ─── GRAIN OVERLAY ───────────────────────────────────── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        background-size: 256px;
        pointer-events: none;
        z-index: 1;
        opacity: 0.6;
      }

      /* ─── NAV ─────────────────────────────────────────────── */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        height: 52px;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
        display: flex;
        align-items: center;
        padding: 0 2.5rem;
      }
      .nav-inner {
        max-width: 1000px;
        margin: 0 auto;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .nav-logo {
        font-family: var(--serif)
        font-size: 20px;
        font-weight: 400;
        color: var(--text);
        text-decoration: none;
        letter-spacing: -0.02em;;
        display: flex;
        align-items: center;
        gap: 8px;
      }

/* Hide logo only on homepage */
.homepage-nav .nav-logo {
  visibility: hidden;
}

      .nav-links {
        display: flex;
        gap: 0;
        list-style: none;
      }
      .nav-links a {
        font-size: 12px;
        color: var(--text-muted);
        text-decoration: none;
        padding: 6px 14px;
        letter-spacing: 0.05em;
        transition: color 0.2s;
        border-radius: 4px;
      }
      .nav-links a:hover {
        color: var(--text);
      }

      /* ─── SECTIONS BASE ───────────────────────────────────── */
      .section {
        padding: 7rem 2.5rem;
        position: relative;
        z-index: 2;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
      }

      .section-label {
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .section-label::before {
        content: "";
        width: 24px;
        height: 1px;
        background: var(--text-muted);
      }

/* ─── HOME ────────────────────────────────────────────── */

#home {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-top: 52px;
}

.home-center {
  text-align: center;
}

.home-center h1 {
  font-family: var(--serif);
  font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: 400;
  letter-spacing: -0.03em;
  color: var(--text);
}

.enter {
  display: inline-block;
  margin-top: 3rem;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
  text-decoration: none;
  transition: opacity 0.3s ease;
}

  #enterButton{
    opacity:0;
    pointer-events:none;
}

.enter:hover {
  opacity: 0.5;
}

#line1,
#line2,
#line3 {
  font-family: "Special Elite", system-ui;
  font-weight: 400;
  font-style: normal;
  font-size: 22px;
}

#line2{
    margin-bottom:.3rem;
}

#line3{
    margin-top:1.5rem;
}

#name{
    margin:0;
}

.typing {
  font-family: "Special Elite", monospace;
  position: relative;
}

@keyframes blink {
  0%, 50% {
    opacity: 1;
  }
  51%, 100% {
    opacity: 0;
  }
}
 #caret {
  display:inline-block;
  width:2px;
  height:1.05em;
  background:var(--text);
  margin-left:5px;
  vertical-align:-2px;
  animation:blink 0.8s infinite;
}

@keyframes blink {
  0%, 50% {
    opacity: 1;
  }

  51%, 100% {
    opacity: 0;
  }
}

      /* ─── FOOTER ──────────────────────────────────────────── */
      .footer {
        border-top: 1px solid var(--border);
        padding: 1.5rem 2.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: relative;
        z-index: 2;
        color: var(--text);
      }
      .footer-inner {
        max-width: 1000px;
        margin: 0 auto;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .footer-left {
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 0.04em;
      }
      .footer-left a {
        color: var(--text);
        text-decoration: underline;
        transition: color 0.15s;
      }
      .footer-left a:hover {
        color: var(--text-muted);
      }
      .footer-right {
        font-size: 11px;
        color: var(--text);
      }

      /* ─── RESPONSIVE ──────────────────────────────────────── */
      @media (max-width: 700px) {
        .nav {
          padding: 0 1.25rem;
        }
        .section {
          padding: 5rem 1.25rem;
        }
        .skills-grid {
          grid-template-columns: 1fr;
        }
        .about-grid {
          grid-template-columns: 1fr;
          gap: 2.5rem;
        }
        .writing-right {
          display: none;
        }
        .nav-links {
          display: none;
        }
        .hero-title {
          font-size: 2.6rem;
        }
        .footer {
          padding: 1.25rem;
        }
      }
    </style>
  </head>
  <body>

    <!-- ─── NAV ────────────────────────────────────────────── -->
<nav class="nav homepage-nav">
  <div class="nav-inner">

    <a href="index.html" class="nav-logo">
    </a>

    <ul class="nav-links">
      <li><a href="writing.html">Writing</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

  </div>
</nav>

    <!-- ─── HOME ───────────────────────────────────────────── -->
<section id="home" class="section">

  <div class="home-center">

    <div id="intro">

<div id="line1" class="special-elite-regular"></div>

<div id="line2" class="special-elite-regular"></div>

<h1 id="name" class="special-elite-regular"></h1>

<div id="line3" class="special-elite-regular"></div>

  <div id="caret"></div>

</div>

    <a href="writing.html" class="enter" id="enterButton">
      enter
    </a>

  </div>

</section>

    <!-- ─── FOOTER ─────────────────────────────────────────── -->
    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-left">
        </div>
        <span class="footer-right"
            ><a
            class="footer-right"
              href="https://github.com/kayspace/portfolio-template/blob/master/templates/template1.html"
              target="_blank"
            ></span>
      </div>
    </footer>

    <!-- ─── JS ─────────────────────────────────────────────── -->
    <script>

      /* GSAP */
      gsap.registerPlugin(ScrollTrigger);

      /* set initial states */
      gsap.set(
        [
          ".greeting",
          ".avail-badge",
          ".hero-title",
          ".hero-role",
          ".hero-desc",
          ".hero-actions",
          ".scroll-hint",
        ],
        { y: 18 },
      );

      /* active nav link highlight */
      const sections = document.querySelectorAll("section[id]");
      const navLinks = document.querySelectorAll(".nav-links a");
      const io = new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              navLinks.forEach((a) => {
                a.style.color =
                  a.getAttribute("href") === "#" + e.target.id
                    ? "var(--text)"
                    : "";
              });
            }
          });
        },
        { threshold: 0.4 },
      );
      sections.forEach((s) => io.observe(s));

const line1 = document.getElementById("line1");
const line2 = document.getElementById("line2");
const line3 = document.getElementById("line3");
const name = document.getElementById("name");
const enter = document.getElementById("enterButton");

function wait(ms){
    return new Promise(resolve=>setTimeout(resolve,ms));
}

const caret = document.getElementById("caret");

async function type(element,text,speed=70){

    element.textContent="";

    element.classList.add("typing");

    for(let i=0;i<text.length;i++){

        element.textContent += text[i];
        caret.style.position = "absolute";
        element.appendChild(caret);
        await wait(speed);

    }

}

async function erase(element,speed=40){

    while(element.textContent.length){

        element.textContent =
        element.textContent.slice(0,-1);

        await wait(speed);

    }

}

async function intro(){

    await type(line1,"Hi...");

    await wait(700);

    await erase(line1);

    await wait(300);

    await type(line2,"I'm",70);

    await wait(400);

    await type(name,"Jeremy Zelken",90);

    await wait(400);

    await type(line3,"Welcome.",80);

    await wait(2200);

    await erase(line3);

    await erase(line2);

    caret.style.display = "none";

    enter.style.pointerEvents="auto";

    enter.animate([
        {opacity:0},
        {opacity:1}
    ],{
        duration:900,
        fill:"forwards"
    });

}

intro();
    </script>
  </body>
</html>
